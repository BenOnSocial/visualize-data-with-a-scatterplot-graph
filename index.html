<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Visualize Data with a Scatterplot Graph</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <script>
      (function () {
        const PROJECT_NAME = 'scatter-plot';

        // 1. Set localStorage immediately so the FCC suite picks it up on load
        localStorage.setItem('fcc_test_suite_project', PROJECT_NAME);

        // 2. Poll for the shadow DOM elements
        const pollFCC = setInterval(() => {
          const wrapper = document.getElementById('fcc_test_suite_wrapper');
          if (!wrapper || !wrapper.shadowRoot) return;

          const shadow = wrapper.shadowRoot;
          const selector = shadow.querySelector('#test-suite-selector');
          const runButton = shadow.querySelector('#fcc_test_message-box-rerun-button');

          if (selector) {
            if (selector.value !== PROJECT_NAME) {
              selector.value = PROJECT_NAME;
              // Use bubbles: true as the FCC script likely listens at a higher level
              selector.dispatchEvent(new Event('change', { bubbles: true }));
            }

            // 3. If found, clear the interval and run tests
            if (runButton) {
              clearInterval(pollFCC);
              setTimeout(() => runButton.click(), 500);
            }
          }
        }, 200);
      })();
    </script>


    <main id="chart">
      <div id="tooltip"></div>
      <script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>
    </main>
  </body>
</html>
